name: AI Secret Scanner

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      issues: write # Needed to read and create comments in issue
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Need full history to perform diffs properly

      - name: Ensure State Issue Exists
        id: state_issue
        uses: actions/github-script@v6
        with:
          script: |
            const ISSUE_TITLE = "Secret Scanner State Log";

            // Search for an existing open issue with the expected title
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              creator: "github-actions[bot]",
              per_page: 100,
            });
            const existing = issues.data.find(i => i.title === ISSUE_TITLE);

            if (existing) {
              console.log(`Found existing state issue #${existing.number}.`);
              core.setOutput("issue_number", existing.number);
              return;
            }

            // No matching open issue found — create a new one
            console.log("No state issue found (may have been deleted). Creating a new one...");
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: ISSUE_TITLE,
              body: "This issue is used as an append-only state log for the AI Secret Scanner workflow. **Do not delete.**",
            });
            console.log(`Created state issue #${created.data.number}.`);
            core.setOutput("issue_number", created.data.number);

      - name: Get Last Scanned Commit
        id: last_commit
        uses: actions/github-script@v6
        with:
          script: |
            const ISSUE_NUMBER = parseInt("${{ steps.state_issue.outputs.issue_number }}", 10);
            try {
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ISSUE_NUMBER,
              });
              
              // Filter our immutable marker created by bot
              const stateComments = comments.data.filter(c => 
                c.user.login === "github-actions[bot]" && 
                c.body.includes("<!-- SECRET_SCAN_STATE -->")
              );
              
              if (stateComments.length > 0) {
                const latest = stateComments[stateComments.length - 1];
                const match = latest.body.match(/"commit": "([a-f0-9]+)"/);
                if (match && match[1]) {
                  console.log(`Found last commit: ${match[1]}`);
                  core.setOutput("commit", match[1]);
                  return;
                }
              }
              console.log("No previous valid state found. Will conduct full scan/diff from beginning.");
              core.setOutput("commit", "");
            } catch (err) {
              console.log(`Error reading issue #${ISSUE_NUMBER}. Treating as clean slate.`);
              core.setOutput("commit", "");
            }

      - name: Compute Diff & Parse to JSON Payload
        id: build_diff
        run: |
          LAST_COMMIT="${{ steps.last_commit.outputs.commit }}"
          
          # Initialize JSON wrapper
          PAYLOAD_FILE="payload.json"
          echo "{\"repo\": \"${{ github.repository }}\", \"commit\": \"${{ github.sha }}\", \"files\": " > $PAYLOAD_FILE
          
          if [ -z "$LAST_COMMIT" ]; then
            echo "Running FULL SCAN..."
            # Simply list files for full scan logic or parse them entirely
            git diff 4b825dc642cb6eb9a060e54bf8d69288fbee4904 HEAD > raw.patch
          else
            echo "Running INCREMENTAL SCAN from $LAST_COMMIT..."
            # Safety check: does commit exist locally?
            if git cat-file -e $LAST_COMMIT^{commit} 2>/dev/null; then
              git diff $LAST_COMMIT...HEAD > raw.patch
            else
              echo "Commit $LAST_COMMIT not found (e.g. force push / rebase). Falling back to merge-base."
              MERGE_BASE=$(git merge-base HEAD origin/main || echo "HEAD~1")
              git diff $MERGE_BASE...HEAD > raw.patch
            fi
          fi
          
          # Quick and dirty diff-to-JSON parsing script
          # (For real-world usage, consider using a proper parsing utility here to format it robustly)
          python3 <<'PYEOF'
          import json

          files = []
          current_file = {}
          current_lines = []

          with open('raw.patch', 'r', encoding='utf-8', errors='ignore') as f:
              for line in f:
                  if line.startswith('+++ b/'):
                      if current_file:
                          current_file['added_lines'] = current_lines
                          files.append(current_file)
                      current_file = {'path': line[6:].strip()}
                      current_lines = []
                  elif line.startswith('+') and not line.startswith('+++'):
                      current_lines.append(line[1:].strip())

              if current_file:
                  current_file['added_lines'] = current_lines
                  files.append(current_file)

          with open('files.json', 'w') as out:
              json.dump(files, out)
          PYEOF
          # Merge parsed files into Payload
          cat files.json >> $PAYLOAD_FILE
          echo "}" >> $PAYLOAD_FILE

      - name: Send Code to API Scanner
        id: api_scan
        run: |
          # Replace with your actual deployment URL
          API_URL="https://divyanshsaraswat--secrets-check-api-fastapi-app.modal.run/scan"
          
          RESPONSE=$(curl -s -X POST $API_URL \
            -H "Content-Type: application/json" \
            -d @payload.json)
          
          echo "$RESPONSE" > result.json
          cat result.json
          
          STATUS=$(jq -r '.status' result.json)
          if [ "$STATUS" = "failed" ]; then
             echo "Failure: High Confidence Secrets Detected."
             exit 1
          fi

      - name: Post Scan Results to Issue
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let result;
            try {
              result = JSON.parse(fs.readFileSync('result.json', 'utf8'));
            } catch (e) {
              console.log("No result.json found, skipping.");
              return;
            }

            const status = result.status || "unknown";
            const emoji = status === "success" ? "✅" : "🚨";
            const findings = result.results || [];

            let body = `<!-- SECRET_SCAN_RESULT -->\n`;
            body += `## ${emoji} Secret Scan Result\n\n`;
            body += `**Commit:** \`${process.env.GITHUB_SHA}\`\n`;
            body += `**Timestamp:** ${new Date().toISOString()}\n`;
            body += `**Status:** \`${status}\`\n\n`;

            if (findings.length > 0) {
              body += `### Findings\n\n`;
              body += `| # | File | Type | Confidence |\n`;
              body += `|---|------|------|------------|\n`;
              findings.forEach((f, i) => {
                body += `| ${i + 1} | \`${f.file || "N/A"}\` | ${f.type || "N/A"} | ${f.llm_confidence ? f.llm_confidence.toFixed(2) : "N/A"} |\n`;
              });
            } else {
              body += `> No secrets detected. All clear! 🎉\n`;
            }

            body += `\n---\n*Full details available in the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}).*`;

            const ISSUE_NUMBER = parseInt("${{ steps.state_issue.outputs.issue_number }}", 10);
            await github.rest.issues.createComment({
              issue_number: ISSUE_NUMBER,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Save State (Append-Only Log to Issue)
        # Only run this if the previous step succeeded (No secrets found)
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            const body = `
            <!-- SECRET_SCAN_STATE -->
            \`\`\`json
            {
              "type": "secret_scan_state",
              "commit": "${process.env.GITHUB_SHA}",
              "timestamp": "${new Date().toISOString()}",
              "status": "success"
            }
            \`\`\`
            `;
            const ISSUE_NUMBER = parseInt("${{ steps.state_issue.outputs.issue_number }}", 10);
            await github.rest.issues.createComment({
              issue_number: ISSUE_NUMBER,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
